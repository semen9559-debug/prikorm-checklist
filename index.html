<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Трекер прикорма</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF9F0;
    --paper:#FFFFFF;
    --ink:#3A342C;
    --ink-soft:#8A8073;

    --sage:#6FA25C;      --sage-l:#DFF0D4;
    --rust:#E2793D;      --rust-l:#FBE4CF;
    --butter:#E8AC2E;    --butter-l:#FDF0D0;
    --sky:#3E8FC4;       --sky-l:#DCEEF7;
    --wheat:#C99A3E;     --wheat-l:#F7ECD3;
    --coral:#E0708A;     --coral-l:#FBE1E8;
    --plum:#A6567A;      --plum-l:#F5E1EA;
    --hazel:#966A3B;     --hazel-l:#EFE2CC;
    --warn:#D64545;      --warn-l:#FBE1E1;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--cream);
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    padding-bottom:56px;
  }

  .hero{
    position:relative;
    padding:30px 20px 24px;
    background:
      radial-gradient(circle at 12% 20%, rgba(111,162,92,0.16), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(224,112,138,0.16), transparent 42%),
      radial-gradient(circle at 90% 80%, rgba(62,143,196,0.14), transparent 40%),
      radial-gradient(circle at 10% 85%, rgba(232,172,46,0.16), transparent 40%),
      linear-gradient(180deg, #FFFDF8 0%, var(--cream) 100%);
    border-bottom:1px solid #F1E4CE;
    z-index:5;
    text-align:center;
    overflow:hidden;
  }
  .hero-plant{
    font-size: 34px;
    transition: font-size .5s cubic-bezier(.34,1.56,.64,1);
    display:inline-block;
    margin-bottom:4px;
  }
  .hero h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:21px;
    margin:2px 0 4px;
    letter-spacing:.2px;
    background:linear-gradient(90deg, var(--sage), var(--sky), var(--coral));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .hero-sub{
    font-size:13px;
    color:var(--ink-soft);
    margin:0 0 14px;
    font-weight:700;
  }
  .stem-wrap{
    max-width:340px;
    margin:0 auto;
    height:9px;
    border-radius:99px;
    background:#F0E4CC;
    overflow:hidden;
    position:relative;
  }
  .stem-fill{
    height:100%;
    border-radius:99px;
    background:linear-gradient(90deg, var(--sage), var(--sky) 35%, var(--coral) 70%, var(--gold, var(--wheat)));
    width:0%;
    transition: width .6s ease;
  }
  .hero-count{
    font-family:'Fredoka', sans-serif;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:9px;
  }
  .hero-count b{ color:var(--ink); }

  main{
    max-width:520px;
    margin:0 auto;
    padding:18px 14px 10px;
  }

  .stage{
    background:var(--paper);
    border-radius:20px;
    margin-bottom:16px;
    overflow:hidden;
    box-shadow: 0 3px 14px rgba(58,52,44,0.07);
    border:1px solid #F1E4CE;
    border-left:5px solid var(--accent, #ccc);
  }

  .stage-head{
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px 16px 14px;
    cursor:pointer;
    user-select:none;
  }
  .stage-emoji{
    font-size:24px;
    width:42px; height:42px;
    display:flex; align-items:center; justify-content:center;
    border-radius:15px;
    flex-shrink:0;
    background: linear-gradient(135deg, var(--accent-l, #eee), var(--accent, #ddd) 130%);
  }
  .stage-title-wrap{ flex:1; min-width:0; }
  .stage-title{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:16px;
    margin:0;
  }
  .stage-progress-text{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:2px;
    font-weight:700;
  }
  .stage-chevron{
    font-size:13px;
    color:var(--ink-soft);
    transition: transform .3s ease;
    flex-shrink:0;
  }
  .stage.collapsed .stage-chevron{ transform: rotate(-90deg); }

  .stage-bar-track{
    height:6px;
    background:#F1E4CE;
    margin:0 16px;
    border-radius:99px;
    overflow:hidden;
  }
  .stage-bar-fill{
    height:100%;
    border-radius:99px;
    width:0%;
    background: var(--accent, #999);
    transition:width .4s ease;
  }

  .stage-body{
    max-height:2400px;
    overflow:hidden;
    transition: max-height .4s ease, opacity .3s ease, padding .3s ease;
    padding:14px 10px 16px;
  }
  .stage.collapsed .stage-body{
    max-height:0;
    opacity:0;
    padding-top:0; padding-bottom:0;
  }

  .item{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 8px;
    border-radius:12px;
    transition: background .2s ease;
  }
  .item:active{ background:var(--accent-l, #F7F2E7); }

  .checkbox{
    width:25px; height:25px;
    border-radius:50%;
    border:2px solid #DDD0B4;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition: all .25s ease;
    font-size:13px;
    color:transparent;
  }
  .checkbox.checked{
    border-color: transparent;
    color:#fff;
    background: var(--accent, #999);
    box-shadow: 0 2px 6px color-mix(in srgb, var(--accent, #999) 50%, transparent);
  }
  .item-label{
    font-size:15px;
    font-weight:700;
    color:var(--ink);
    transition: color .25s ease, opacity .25s ease;
    line-height:1.3;
  }
  .item-label.checked{
    color:var(--ink-soft);
    text-decoration: line-through;
    text-decoration-color:#C9BFA9;
    opacity:.7;
    font-weight:600;
  }

  .goal-note{
    margin:8px 8px 2px;
    padding:12px 14px;
    border-radius:14px;
    font-size:13px;
    line-height:1.5;
    display:flex;
    gap:8px;
    align-items:flex-start;
    background: var(--accent-l, #eee);
    color: var(--ink);
    font-weight:700;
  }
  .goal-note span.ic{ font-size:15px; }

  .subtitle-note{
    margin:-4px 8px 10px;
    font-size:12.5px;
    color:var(--ink-soft);
    font-weight:700;
    padding:0 8px;
  }

  .plain-list{
    list-style:none;
    padding:0 8px;
    margin:0;
  }
  .plain-list li{
    display:flex;
    gap:10px;
    align-items:flex-start;
    font-size:15px;
    font-weight:700;
    padding:9px 8px;
    line-height:1.4;
  }
  .warn-list li{ color:#8C2E2E; }
  .warn-list li::before{
    content:"✕";
    color:var(--warn);
    font-size:14px;
    font-weight:800;
    line-height:1.4;
    background: var(--warn-l);
    width:20px; height:20px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }

  /* theme accent variables per stage */
  .theme-sage{ --accent:var(--sage); --accent-l:var(--sage-l); }
  .theme-rust{ --accent:var(--rust); --accent-l:var(--rust-l); }
  .theme-butter{ --accent:var(--butter); --accent-l:var(--butter-l); }
  .theme-sky{ --accent:var(--sky); --accent-l:var(--sky-l); }
  .theme-wheat{ --accent:var(--wheat); --accent-l:var(--wheat-l); }
  .theme-coral{ --accent:var(--coral); --accent-l:var(--coral-l); }
  .theme-plum{ --accent:var(--plum); --accent-l:var(--plum-l); }
  .theme-hazel{ --accent:var(--hazel); --accent-l:var(--hazel-l); }
  .theme-warn{ --accent:var(--warn); --accent-l:var(--warn-l); }

  footer{
    text-align:center;
    font-size:11.5px;
    color:#B4A98F;
    padding:18px 20px 6px;
  }

  .reset-btn{
    display:block;
    margin:14px auto 0;
    background:none;
    border:1px solid #E5D6B4;
    color:var(--ink-soft);
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:12px;
    padding:9px 18px;
    border-radius:99px;
  }

  .made-with{
    margin-top:6px;
    font-size:12.5px;
    color:#A99E85;
    font-weight:800;
    letter-spacing:.2px;
  }
  .made-with .heart{ color:var(--coral); }
  .social{
    display:flex;
    justify-content:center;
    gap:14px;
    margin-top:11px;
    padding-bottom:4px;
  }
  .social a{
    width:40px; height:40px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--paper);
    border:1px solid #F1E4CE;
    box-shadow:0 2px 9px rgba(58,52,44,0.08);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .social a:active{ transform: scale(.9); }
  .social svg{ width:21px; height:21px; display:block; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-plant" id="heroPlant">🌱</div>
  <h1>🌸 Трекер прикорма 5,5–12 месяцев</h1>
  <p class="hero-sub">Список продуктов для введения прикорма</p>
  <div class="stem-wrap"><div class="stem-fill" id="stemFill"></div></div>
  <div class="hero-count" id="heroCount">0 из 0 продуктов</div>
</div>

<main id="main"></main>

<footer>
  Отмечайте продукты по мере знакомства малыша с ними 🍼
  <div class="made-with">Создана с любовью <span class="heart">❤</span></div>
  <div class="social">
    <a href="https://www.instagram.com/anastaaasia__/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="igGrad" x1="2" y1="22" x2="22" y2="2" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#F9CE34"/>
            <stop offset="0.5" stop-color="#EE2A7B"/>
            <stop offset="1" stop-color="#6228D7"/>
          </linearGradient>
        </defs>
        <rect x="2.2" y="2.2" width="19.6" height="19.6" rx="5.6" stroke="url(#igGrad)" stroke-width="2"/>
        <circle cx="12" cy="12" r="4.4" stroke="url(#igGrad)" stroke-width="2"/>
        <circle cx="17.6" cy="6.4" r="1.25" fill="url(#igGrad)"/>
      </svg>
    </a>
    <a href="https://t.me/mamaclub_ru" target="_blank" rel="noopener noreferrer" aria-label="Telegram">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#29A9EB" d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.161c-.18 1.897-.962 6.502-1.359 8.627-.168.9-.5 1.201-.82 1.23-.697.064-1.226-.461-1.901-.903-1.056-.692-1.653-1.123-2.678-1.799-1.185-.781-.417-1.21.258-1.911.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.139-5.062 3.345-.479.329-.913.489-1.302.481-.428-.009-1.252-.242-1.865-.44-.752-.244-1.349-.374-1.297-.789.027-.216.324-.437.892-.663 3.498-1.524 5.831-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635.099-.002.321.023.465.14.121.098.154.23.169.323.016.093.036.306.02.472z"/>
      </svg>
    </a>
  </div>
</footer>

<script>
const STAGES = [
  {
    id:"s1", emoji:"🌱", theme:"sage", age:"5,5–6 месяцев",
    items:["Кабачок","Цветная капуста","Брокколи","Гречневая каша","Яблоко","Рисовая каша","Груша","Кукурузная каша","Тыква","Овсяная каша","Морковь","Банан","Чернослив","Растительное масло (по несколько капель в овощное пюре)","Вода после прикорма"],
    goal:"К концу 6 месяцев желательно познакомить малыша с овощами, безглютеновыми кашами и несколькими фруктами."
  },
  {
    id:"s2", emoji:"🥩", theme:"rust", age:"6–7 месяцев",
    items:["Индейка","Батат","Кролик","Персик","Курица","Абрикос","Говядина","Телятина","Зелёный горошек","Слива","Кабачок кусочками (если готова)","Брокколи кусочками","Цветная капуста кусочками","Сливочное масло (в кашу)"],
    goal:"После введения мяса предлагайте его регулярно небольшими порциями."
  },
  {
    id:"s3", emoji:"🥚", theme:"butter", age:"7–8 месяцев",
    items:["Желток","Картофель","Натуральный йогурт без сахара","Творог","Пшеничная каша","Пшённая каша","Многозерновая каша","Стручковая фасоль","Свёкла"]
  },
  {
    id:"s4", emoji:"🐟", theme:"sky", age:"8–9 месяцев",
    items:["Хек","Авокадо","Минтай","Черника","Треска","Малина","Судак","Клубника","Киви","Форель или лосось"],
    goal:"Рыбу предлагать 1–2 раза в неделю."
  },
  {
    id:"s5", emoji:"🍝", theme:"wheat", age:"9–10 месяцев",
    items:["Макароны","Манго","Хлеб","Чечевица","Нут","Фасоль","Кукуруза","Обычная гречневая крупа","Овсяные хлопья"]
  },
  {
    id:"s6", emoji:"🍳", theme:"coral", age:"10–11 месяцев",
    items:["Целое яйцо","Сыр","Омлет","Томат (без кожицы)","Огурец (без кожуры)","Болгарский перец"]
  },
  {
    id:"s7", emoji:"🍽️", theme:"plum", age:"11–12 месяцев",
    items:["Семейные супы без соли","Овощные рагу","Паровые котлеты","Тефтели","Фрикадельки","Запеканки","Запечённая рыба","Домашние оладьи без сахара","Каши из обычной крупы","Фрукты кусочками","Овощи кусочками","Самостоятельно есть ложкой","Пить из кружки"]
  },
  {
    id:"s8", emoji:"🌰", theme:"hazel", age:"Основные аллергены",
    subtitle:"Ввести в течение первого года",
    items:["Яйцо","Рыба","Пшеница","Молочные продукты","Соя","Кунжут","Арахис (только в виде пасты, а не цельных орехов)"]
  },
];

const WARN_SECTION = {
  id:"w1", emoji:"🚫", theme:"warn", age:"До года не рекомендуется",
  list:["Мёд","Цельное коровье молоко как основной напиток","Соль и сахар в блюда","Цельные орехи","Попкорн","Целые виноградины и другие продукты с высоким риском поперхнуться"]
};

const STORAGE_KEY = "prikorm-checked-v2";
let state = {};

function loadState(){
  try{
    const val = localStorage.getItem(STORAGE_KEY);
    if(val) state = JSON.parse(val);
  }catch(e){ state = {}; }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error("save failed", e); }
}

function totalCounts(){
  let total=0, checked=0;
  STAGES.forEach(st=>{
    st.items.forEach((_,i)=>{
      total++;
      if(state[st.id+"-"+i]) checked++;
    });
  });
  return {total, checked};
}

function updateHero(){
  const {total, checked} = totalCounts();
  const pct = total? Math.round(checked/total*100) : 0;
  document.getElementById("stemFill").style.width = pct+"%";
  document.getElementById("heroCount").innerHTML = `<b>${checked}</b> из ${total} продуктов`;
  const plant = document.getElementById("heroPlant");
  const size = 28 + (pct/100)*34;
  plant.style.fontSize = size+"px";
  let emoji = "🌱";
  if(pct>=90) emoji="🌳";
  else if(pct>=60) emoji="🌿";
  else if(pct>=25) emoji="🌾";
  plant.textContent = emoji;
}

function updateStageProgress(stEl, st){
  const items = st.items;
  let checked=0;
  items.forEach((_,i)=>{ if(state[st.id+"-"+i]) checked++; });
  stEl.querySelector(".stage-progress-text").textContent = `${checked} из ${items.length}`;
  const barFill = stEl.querySelector(".stage-bar-fill");
  barFill.style.width = (items.length? checked/items.length*100:0)+"%";
}

function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";

  STAGES.forEach(st=>{
    const stEl = document.createElement("div");
    stEl.className = `stage theme-${st.theme}`;

    const head = document.createElement("div");
    head.className = "stage-head";
    head.innerHTML = `
      <div class="stage-emoji">${st.emoji}</div>
      <div class="stage-title-wrap">
        <p class="stage-title">${st.age}</p>
        <div class="stage-progress-text">0 из ${st.items.length}</div>
      </div>
      <div class="stage-chevron">▾</div>
    `;
    head.addEventListener("click", ()=>{
      stEl.classList.toggle("collapsed");
    });
    stEl.appendChild(head);

    const barTrack = document.createElement("div");
    barTrack.className = "stage-bar-track";
    barTrack.innerHTML = `<div class="stage-bar-fill"></div>`;
    stEl.appendChild(barTrack);

    const body = document.createElement("div");
    body.className = "stage-body";

    if(st.subtitle){
      const sub = document.createElement("div");
      sub.className = "subtitle-note";
      sub.textContent = st.subtitle;
      body.appendChild(sub);
    }

    st.items.forEach((name,i)=>{
      const key = st.id+"-"+i;
      const item = document.createElement("div");
      item.className = "item";
      item.innerHTML = `
        <div class="checkbox">✓</div>
        <div class="item-label">${name}</div>
      `;
      const box = item.querySelector(".checkbox");
      const label = item.querySelector(".item-label");
      const applyState = ()=>{
        const isChecked = !!state[key];
        box.classList.toggle("checked", isChecked);
        label.classList.toggle("checked", isChecked);
      };
      applyState();
      item.addEventListener("click", async ()=>{
        state[key] = !state[key];
        applyState();
        updateStageProgress(stEl, st);
        updateHero();
        await saveState();
      });
      body.appendChild(item);
    });

    if(st.goal){
      const note = document.createElement("div");
      note.className = "goal-note";
      note.innerHTML = `<span class="ic">🎯</span><span>${st.goal}</span>`;
      body.appendChild(note);
    }

    stEl.appendChild(body);
    main.appendChild(stEl);
    updateStageProgress(stEl, st);
  });

  // warning section (non-checkbox)
  const warnEl = document.createElement("div");
  warnEl.className = `stage theme-${WARN_SECTION.theme}`;
  warnEl.innerHTML = `
    <div class="stage-head">
      <div class="stage-emoji">${WARN_SECTION.emoji}</div>
      <div class="stage-title-wrap">
        <p class="stage-title">${WARN_SECTION.age}</p>
        <div class="stage-progress-text">Важно помнить</div>
      </div>
      <div class="stage-chevron">▾</div>
    </div>
    <div class="stage-body">
      <ul class="plain-list warn-list">
        ${WARN_SECTION.list.map(t=>`<li>${t}</li>`).join("")}
      </ul>
    </div>
  `;
  warnEl.querySelector(".stage-head").addEventListener("click", ()=>{
    warnEl.classList.toggle("collapsed");
  });
  main.appendChild(warnEl);

  const resetBtn = document.createElement("button");
  resetBtn.className = "reset-btn";
  resetBtn.textContent = "Сбросить отметки";
  resetBtn.addEventListener("click", async ()=>{
    if(confirm("Сбросить все отметки?")){
      state = {};
      await saveState();
      render();
      updateHero();
    }
  });
  main.appendChild(resetBtn);

  updateHero();
}

(async ()=>{
  await loadState();
  render();
})();
</script>
</body>
</html>
