<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFF9F0">
<meta name="description" content="Интерактивный трекер прикорма 5,5–12 месяцев: список продуктов по возрастам с короткими советами по каждому.">
<title>Трекер прикорма 5,5–12 месяцев</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF9F0;
    --paper:#FFFFFF;
    --ink:#3A342C;
    --ink-soft:#8A8073;

    --sage:#6FA25C;      --sage-l:#DFF0D4;
    --rust:#E2793D;      --rust-l:#FBE4CF;
    --butter:#E8AC2E;    --butter-l:#FDF0D0;
    --sky:#3E8FC4;       --sky-l:#DCEEF7;
    --wheat:#C99A3E;     --wheat-l:#F7ECD3;
    --coral:#E0708A;     --coral-l:#FBE1E8;
    --plum:#A6567A;      --plum-l:#F5E1EA;
    --hazel:#966A3B;     --hazel-l:#EFE2CC;
    --warn:#D64545;      --warn-l:#FBE1E1;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--cream);
    font-family:'Nunito', sans-serif;
    color:var(--ink);
    padding-bottom:40px;
    overflow-x:hidden;
  }
  :focus-visible{ outline:3px solid var(--sky); outline-offset:2px; border-radius:8px; }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;
    padding:calc(26px + env(safe-area-inset-top)) 20px 22px;
    background:
      radial-gradient(circle at 12% 20%, rgba(111,162,92,0.16), transparent 40%),
      radial-gradient(circle at 85% 15%, rgba(224,112,138,0.16), transparent 42%),
      radial-gradient(circle at 90% 80%, rgba(62,143,196,0.14), transparent 40%),
      radial-gradient(circle at 10% 85%, rgba(232,172,46,0.16), transparent 40%),
      linear-gradient(180deg, #FFFDF8 0%, var(--cream) 100%);
    border-bottom:1px solid #F1E4CE;
    z-index:5;
    text-align:center;
    overflow:hidden;
  }
  .hero-plant{
    font-size: 34px;
    transition: font-size .5s cubic-bezier(.34,1.56,.64,1);
    display:inline-block;
    margin-bottom:4px;
  }
  .hero h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:22px;
    margin:2px 0 4px;
    letter-spacing:.2px;
    background:linear-gradient(90deg, var(--sage), var(--sky), var(--coral));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .hero-sub{
    font-size:13px;
    color:var(--ink-soft);
    margin:0 0 14px;
    font-weight:700;
  }
  .stem-wrap{
    max-width:360px;
    margin:0 auto;
    height:9px;
    border-radius:99px;
    background:#F0E4CC;
    overflow:hidden;
    position:relative;
  }
  .stem-fill{
    height:100%;
    border-radius:99px;
    background:linear-gradient(90deg, var(--sage), var(--sky) 35%, var(--coral) 70%, var(--butter));
    width:0%;
    transition: width .6s cubic-bezier(.34,1.4,.6,1);
  }
  .hero-count{
    font-family:'Fredoka', sans-serif;
    font-size:12px;
    color:var(--ink-soft);
    margin-top:9px;
  }
  .hero-count b{ color:var(--ink); }

  .search-wrap{
    max-width:360px;
    margin:15px auto 0;
    position:relative;
  }
  .search-wrap .mag{
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    font-size:14px; opacity:.5; pointer-events:none;
  }
  #search{
    width:100%;
    border:1px solid #EAD9B8;
    background:var(--paper);
    border-radius:99px;
    padding:11px 38px 11px 38px;
    font-family:'Nunito',sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--ink);
    box-shadow:0 2px 8px rgba(58,52,44,0.05);
  }
  #search::placeholder{ color:#BCB09A; font-weight:700; }
  .search-clear{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:26px; height:26px; border:none; background:#F1E7D2; color:var(--ink-soft);
    border-radius:50%; font-size:15px; cursor:pointer; display:none;
    align-items:center; justify-content:center; font-weight:800;
  }
  .search-clear.show{ display:flex; }

  .chips{ display:flex; gap:8px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
  .chip{
    border:1px solid #EAD9B8; background:var(--paper); color:var(--ink-soft);
    border-radius:99px; padding:6px 15px; font-family:'Nunito',sans-serif;
    font-weight:800; font-size:12.5px; cursor:pointer; transition:all .2s;
  }
  .chip.active{ background:var(--sage); border-color:var(--sage); color:#fff; box-shadow:0 2px 8px rgba(111,162,92,.3); }

  /* ---------- LAYOUT ---------- */
  .layout{
    max-width:940px;
    margin:0 auto;
    padding:18px 14px 10px;
    display:flex;
    gap:24px;
    align-items:flex-start;
  }
  main{ flex:1 1 auto; min-width:0; max-width:560px; }
  .no-results{
    text-align:center; color:var(--ink-soft); font-weight:700;
    padding:30px 10px; display:none;
  }
  .no-results.show{ display:block; }

  /* ---------- GUIDE PANEL (desktop) ---------- */
  .guide{
    width:320px; flex:0 0 320px;
    position:sticky; top:16px;
  }
  .guide-card{
    background:var(--paper);
    border:1px solid #F1E4CE;
    border-radius:22px;
    padding:20px 20px 18px;
    box-shadow:0 4px 18px rgba(58,52,44,0.07);
  }
  .guide-card h2{
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:17px;
    margin:0 0 10px;
  }
  .guide-card p{ font-size:13.5px; line-height:1.55; margin:0 0 10px; color:#5C554A; font-weight:600; }
  .guide-rules{ list-style:none; padding:0; margin:6px 0 4px; }
  .guide-rules li{
    font-size:13px; line-height:1.45; padding:6px 0 6px 26px; position:relative;
    font-weight:700; color:var(--ink);
  }
  .guide-rules li::before{
    content:attr(data-ic); position:absolute; left:0; top:5px; font-size:15px;
  }
  .guide-motivate{
    margin-top:14px; padding:12px 14px; border-radius:14px;
    background:linear-gradient(135deg, var(--sage-l), var(--sky-l));
    font-size:13px; font-weight:800; line-height:1.4; color:var(--ink);
  }
  .guide-disclaimer{
    margin-top:12px; font-size:11.5px; line-height:1.4; color:var(--ink-soft);
    font-weight:700; display:flex; gap:6px; align-items:flex-start;
  }
  .guide-hint{
    margin-top:12px; font-size:12px; color:#B4A98F; font-weight:800; text-align:center;
  }

  /* product card (shared by guide + sheet) */
  .pcard{ animation: pcIn .28s cubic-bezier(.34,1.4,.6,1); }
  @keyframes pcIn{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .pcard-hero{
    height:96px; border-radius:16px; margin-bottom:12px;
    display:flex; align-items:center; justify-content:center; gap:6px;
    background:linear-gradient(135deg, var(--accent-l,#eee), color-mix(in srgb, var(--accent,#ddd) 22%, #fff));
    position:relative; overflow:hidden;
  }
  .pcard-animal{ font-size:46px; animation: bob 2.2s ease-in-out infinite; }
  .pcard-food{ font-size:38px; animation: bob 2.2s ease-in-out infinite .3s; }
  @keyframes bob{ 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(-7px) rotate(3deg);} }
  .pcard-badge{
    display:inline-block; font-size:11px; font-weight:800; color:#fff;
    background:var(--accent,#999); padding:3px 10px; border-radius:99px; margin-bottom:8px;
  }
  .pcard-name{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:19px; margin:0 0 8px; }
  .pcard-tip{ font-size:14px; line-height:1.55; color:#4C463C; font-weight:600; margin:0; }
  .pcard-date{ margin-top:11px; font-size:12.5px; font-weight:800; color:var(--accent,#777); display:flex; gap:6px; align-items:center; }
  .pcard-react{ margin-top:15px; }
  .pcard-react-title{ font-size:12px; font-weight:800; color:var(--ink-soft); margin-bottom:8px; }
  .react-btns{ display:flex; gap:8px; }
  .react-btn{ flex:1; border:1.5px solid #EADFC6; background:var(--paper); border-radius:13px; padding:9px 4px; font-size:22px; cursor:pointer; line-height:1; transition:transform .15s, border-color .2s, background .2s; }
  .react-btn:hover{ transform:translateY(-2px); }
  .react-btn.active{ border-color:var(--accent,#999); background:var(--accent-l,#eee); transform:translateY(-2px); }
  .react-btn small{ display:block; font-size:9.5px; font-weight:800; color:var(--ink-soft); margin-top:4px; }
  .row-react{ font-size:15px; flex-shrink:0; width:19px; text-align:center; }

  /* ---------- STAGES ---------- */
  .stage{
    background:var(--paper);
    border-radius:20px;
    margin-bottom:16px;
    overflow:hidden;
    box-shadow: 0 3px 14px rgba(58,52,44,0.07);
    border:1px solid #F1E4CE;
    border-left:5px solid var(--accent, #ccc);
  }
  .stage.hide{ display:none; }
  .stage-head{
    display:flex; align-items:center; gap:12px;
    padding:16px 16px 14px; cursor:pointer; user-select:none;
  }
  .stage-emoji{
    font-size:24px; width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    border-radius:15px; flex-shrink:0;
    background: linear-gradient(135deg, var(--accent-l, #eee), var(--accent, #ddd) 130%);
  }
  .stage-title-wrap{ flex:1; min-width:0; }
  .stage-title{ font-family:'Fredoka', sans-serif; font-weight:600; font-size:16px; margin:0; }
  .stage-progress-text{ font-size:12px; color:var(--ink-soft); margin-top:2px; font-weight:700; }
  .stage-chevron{ font-size:13px; color:var(--ink-soft); transition: transform .3s ease; flex-shrink:0; }
  .stage.collapsed .stage-chevron{ transform: rotate(-90deg); }
  .stage-medal{ font-size:18px; margin-left:2px; display:none; flex-shrink:0; }
  .stage.done .stage-medal{ display:inline-block; animation: medalPop .45s cubic-bezier(.34,1.6,.6,1); }
  @keyframes medalPop{ 0%{transform:scale(0) rotate(-40deg);} 60%{transform:scale(1.3) rotate(8deg);} 100%{transform:scale(1) rotate(0);} }

  .stage-bar-track{ height:6px; background:#F1E4CE; margin:0 16px; border-radius:99px; overflow:hidden; }
  .stage-bar-fill{ height:100%; border-radius:99px; width:0%; background: var(--accent, #999); transition:width .5s cubic-bezier(.34,1.4,.6,1); }
  .stage.done .stage-emoji{ box-shadow:0 0 0 3px var(--accent); }

  .stage-body{
    max-height:3000px; overflow:hidden;
    transition: max-height .4s ease, opacity .3s ease, padding .3s ease;
    padding:12px 10px 14px;
  }
  .stage.collapsed .stage-body{ max-height:0; opacity:0; padding-top:0; padding-bottom:0; }

  .item{
    display:flex; align-items:center; gap:12px;
    padding:10px 8px; border-radius:12px;
    transition: background .2s ease;
    cursor:pointer; position:relative;
  }
  .item:hover{ background:var(--accent-l, #F7F2E7); }
  .item.hidden{ display:none; }
  .item.hl{ background:var(--accent-l, #F7F2E7); }

  .checkbox{
    width:26px; height:26px; border-radius:50%;
    border:2px solid #DDD0B4; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition: all .25s cubic-bezier(.34,1.56,.64,1);
    font-size:14px; color:transparent;
  }
  .checkbox.checked{
    border-color: transparent; color:#fff;
    background: var(--accent, #999);
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent, #999) 50%, transparent);
    transform: scale(1.06);
  }
  .item-label{
    flex:1; font-size:15px; font-weight:700; color:var(--ink);
    transition: color .25s ease, opacity .25s ease; line-height:1.3;
  }
  .item-label.checked{
    color:var(--ink-soft); text-decoration: line-through;
    text-decoration-color:#C9BFA9; opacity:.7; font-weight:600;
  }
  .info-btn{
    width:27px; height:27px; border-radius:50%; flex-shrink:0;
    border:1.5px solid color-mix(in srgb, var(--accent,#ccc) 55%, #fff);
    color:var(--accent,#999); background:transparent;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:14px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition: background .2s ease, transform .2s ease;
  }
  .info-btn:hover{ background:var(--accent-l,#eee); }
  .info-btn:active{ transform:scale(.88); }

  .goal-note{
    margin:8px 8px 2px; padding:12px 14px; border-radius:14px;
    font-size:13px; line-height:1.5; display:flex; gap:8px; align-items:flex-start;
    background: var(--accent-l, #eee); color: var(--ink); font-weight:700;
  }
  .goal-note span.ic{ font-size:15px; }
  .subtitle-note{ margin:-2px 8px 10px; font-size:12.5px; color:var(--ink-soft); font-weight:700; padding:0 8px; }

  .plain-list{ list-style:none; padding:0 8px; margin:0; }
  .plain-list li{ display:flex; gap:10px; align-items:flex-start; font-size:15px; font-weight:700; padding:9px 8px; line-height:1.4; }
  .warn-list li{ color:#8C2E2E; }
  .warn-list li::before{
    content:"✕"; color:var(--warn); font-size:14px; font-weight:800; line-height:1.4;
    background: var(--warn-l); width:20px; height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }

  .theme-sage{ --accent:var(--sage); --accent-l:var(--sage-l); }
  .theme-rust{ --accent:var(--rust); --accent-l:var(--rust-l); }
  .theme-butter{ --accent:var(--butter); --accent-l:var(--butter-l); }
  .theme-sky{ --accent:var(--sky); --accent-l:var(--sky-l); }
  .theme-wheat{ --accent:var(--wheat); --accent-l:var(--wheat-l); }
  .theme-coral{ --accent:var(--coral); --accent-l:var(--coral-l); }
  .theme-plum{ --accent:var(--plum); --accent-l:var(--plum-l); }
  .theme-hazel{ --accent:var(--hazel); --accent-l:var(--hazel-l); }
  .theme-warn{ --accent:var(--warn); --accent-l:var(--warn-l); }

  /* ---------- FOOTER ---------- */
  footer{ text-align:center; font-size:11.5px; color:#B4A98F; padding:14px 20px 6px; max-width:560px; margin:0 auto; }
  .reset-btn{
    display:block; margin:6px auto 16px; background:none;
    border:1px solid #E5D6B4; color:var(--ink-soft);
    font-family:'Nunito',sans-serif; font-weight:800; font-size:12px;
    padding:9px 18px; border-radius:99px; cursor:pointer;
  }
  .made-with{ margin-top:6px; font-size:12.5px; color:#A99E85; font-weight:800; letter-spacing:.2px; }
  .made-with .heart{ color:var(--coral); }
  .social{ display:flex; justify-content:center; gap:14px; margin-top:11px; padding-bottom:4px; }
  .social a{
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:var(--paper); border:1px solid #F1E4CE;
    box-shadow:0 2px 9px rgba(58,52,44,0.08);
    transition: transform .2s ease;
  }
  .social a:active{ transform: scale(.9); }
  .social svg{ width:21px; height:21px; display:block; }

  /* ---------- BOTTOM SHEET (mobile) ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(40,34,28,.42);
    opacity:0; pointer-events:none; transition:opacity .25s; z-index:80;
  }
  .sheet-backdrop.open{ opacity:1; pointer-events:auto; }
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:81;
    background:var(--paper); border-radius:24px 24px 0 0;
    padding:12px 22px calc(26px + env(safe-area-inset-bottom));
    transform:translateY(102%); transition:transform .34s cubic-bezier(.34,1.3,.5,1);
    max-width:520px; margin:0 auto; box-shadow:0 -6px 34px rgba(0,0,0,.18);
    overflow:visible;
  }
  .sheet-inner{ max-height:76vh; overflow-y:auto; }
  .sheet.open{ transform:translateY(0); }
  .sheet-grip{ width:44px; height:6px; border-radius:99px; background:#E3D8BE; margin:2px auto 14px; cursor:grab; }
  .sheet-close{
    position:absolute; top:-26px; right:18px; width:50px; height:50px; z-index:3;
    border:1px solid #F1E4CE; border-radius:50%; background:var(--paper); color:var(--ink);
    font-size:19px; font-weight:800; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 5px 18px rgba(58,52,44,.22);
    transition:transform .15s, background .2s;
  }
  .sheet-close:hover{ background:#FBF4E7; }
  .sheet-close:active{ transform:scale(.9); }
  .sheet .guide-disclaimer{ margin-top:14px; }
  @media(min-width:981px){ .sheet, .sheet-backdrop{ display:none !important; } }
  @media(max-width:980px){
    .layout{ display:block; }
    main{ max-width:520px; margin:0 auto; }
    .guide{ display:none; }
  }

  /* ---------- TOAST ---------- */
  .toast{
    position:fixed; left:50%; top:calc(14px + env(safe-area-inset-top));
    transform:translateX(-50%) translateY(-24px);
    background:var(--ink); color:#fff; padding:10px 20px; border-radius:99px;
    font-weight:800; font-size:13.5px; z-index:95; opacity:0;
    transition:all .32s cubic-bezier(.34,1.4,.6,1); box-shadow:0 8px 24px rgba(0,0,0,.22);
    pointer-events:none; white-space:nowrap;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- FX ---------- */
  .fx-layer{ position:fixed; inset:0; pointer-events:none; z-index:90; overflow:hidden; }
  .fx-item{ position:fixed; will-change:transform,opacity; pointer-events:none; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
    .stem-fill, .stage-bar-fill{ transition-duration:.3s !important; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-plant" id="heroPlant">🌱</div>
  <h1>🌸 Трекер прикорма 5,5–12 месяцев</h1>
  <p class="hero-sub">Отмечайте продукты и открывайте советы по каждому</p>
  <div class="stem-wrap"><div class="stem-fill" id="stemFill"></div></div>
  <div class="hero-count" id="heroCount">0 из 0 продуктов</div>
  <div class="search-wrap">
    <span class="mag">🔍</span>
    <input id="search" type="search" placeholder="Поиск продукта…" aria-label="Поиск продукта" autocomplete="off">
    <button class="search-clear" id="searchClear" aria-label="Очистить поиск">✕</button>
  </div>
  <div class="chips" id="chips">
    <button class="chip active" data-f="all" type="button">Все</button>
    <button class="chip" data-f="todo" type="button">Невведённые</button>
    <button class="chip" data-f="allergens" type="button">Аллергены</button>
  </div>
</div>

<div class="layout">
  <main id="main"></main>
  <aside class="guide" aria-label="Гайд по прикорму">
    <div class="guide-card" id="guideCard"></div>
  </aside>
</div>

<div class="no-results" id="noResults">Ничего не найдено 🙈<br>Попробуйте другое слово</div>

<footer>
  Отмечайте продукты по мере знакомства малыша с ними 🍼
  <div class="made-with">Создана с любовью <span class="heart">❤</span></div>
  <div class="social">
    <a href="https://www.instagram.com/anastaaasia__/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="igGrad" x1="2" y1="22" x2="22" y2="2" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#F9CE34"/>
            <stop offset="0.5" stop-color="#EE2A7B"/>
            <stop offset="1" stop-color="#6228D7"/>
          </linearGradient>
        </defs>
        <rect x="2.2" y="2.2" width="19.6" height="19.6" rx="5.6" stroke="url(#igGrad)" stroke-width="2"/>
        <circle cx="12" cy="12" r="4.4" stroke="url(#igGrad)" stroke-width="2"/>
        <circle cx="17.6" cy="6.4" r="1.25" fill="url(#igGrad)"/>
      </svg>
    </a>

/* ---------- STATE ---------- */
function loadState(){
  try{ const v = localStorage.getItem(STORAGE_KEY); if(v) state = JSON.parse(v); }catch(e){ state = {}; }
  try{ const r = localStorage.getItem(R_KEY); if(r) reactions = JSON.parse(r); }catch(e){ reactions = {}; }
  try{ const d = localStorage.getItem(D_KEY); if(d) dates = JSON.parse(d); }catch(e){ dates = {}; }
}
function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
}
function saveReactions(){ try{ localStorage.setItem(R_KEY, JSON.stringify(reactions)); }catch(e){} }
function saveDates(){ try{ localStorage.setItem(D_KEY, JSON.stringify(dates)); }catch(e){} }
function totalCounts(){
  let total=0, checked=0;
  STAGES.forEach(st=> st.items.forEach((_,i)=>{ total++; if(state[st.id+"-"+i]) checked++; }));
  return {total, checked};
}

/* ---------- HERO ---------- */
function updateHero(){
  const {total, checked} = totalCounts();
  const pct = total? Math.round(checked/total*100) : 0;
  document.getElementById("stemFill").style.width = pct+"%";
  document.getElementById("heroCount").innerHTML = `<b>${checked}</b> из ${total} продуктов`;
  const plant = document.getElementById("heroPlant");
  plant.style.fontSize = (28 + (pct/100)*34) + "px";
  let e = "🌱";
  if(pct>=90) e="🌳"; else if(pct>=60) e="🌿"; else if(pct>=25) e="🌾";
  plant.textContent = e;
  updateGuideDefault();
}
function updateStageProgress(stEl, st){
  let checked=0; st.items.forEach((_,i)=>{ if(state[st.id+"-"+i]) checked++; });
  stEl.querySelector(".stage-progress-text").textContent = `${checked} из ${st.items.length}`;
  stEl.querySelector(".stage-bar-fill").style.width = (st.items.length? checked/st.items.length*100:0)+"%";
  stEl.classList.toggle("done", checked===st.items.length && st.items.length>0);
}

function productCardHTML(st, item, key){
  const dateHtml = (key && dates[key]) ? `<div class="pcard-date">📅 Введён: ${fmtDate(dates[key])}</div>` : "";
  const cur = (key && reactions[key]) || "";
  const rb = (r,em,lbl)=>`<button class="react-btn ${cur===r?'active':''}" data-r="${r}" type="button">${em}<small>${lbl}</small></button>`;
  return `
    <div class="pcard theme-${st.theme}">
      <div class="pcard-hero"><span class="pcard-animal">${st.animal||"🐰"}</span><span class="pcard-food">${item.f}</span></div>
      <span class="pcard-badge">${st.age}</span>
      <div class="pcard-name">${item.n.replace(/\s*\(.*?\)\s*/g," ").trim()}</div>
      <p class="pcard-tip">${item.t}</p>
      ${dateHtml}
      <div class="pcard-react">
        <div class="pcard-react-title">Как малышу продукт?</div>
        <div class="react-btns">
          ${rb("love","😋","Нравится")}
          ${rb("meh","😐","Нейтрально")}
          ${rb("no","🤢","Не пошло")}
        </div>
      </div>
      <div class="guide-disclaimer"><span>ℹ️</span><span>Ориентир. Вводите с учётом рекомендаций вашего педиатра.</span></div>
    </div>`;
}
function renderCard(container, st, item, key){
  container.innerHTML = productCardHTML(st, item, key);
  container.querySelectorAll(".react-btn").forEach(b=>{
    b.addEventListener("click", e=>{
      e.stopPropagation();
      const r = b.dataset.r;
      if(reactions[key]===r) delete reactions[key]; else reactions[key] = r;
      saveReactions();
      renderCard(container, st, item, key);
      updateRowReact(key);
      if(navigator.vibrate) navigator.vibrate(12);
    });
  });
}
function updateRowReact(key){
  const el = document.querySelector(`.item[data-key="${CSS.escape(key)}"] .row-react`);
  if(el) el.textContent = reactions[key] ? REMOJI[reactions[key]] : "";
}
let guideDefaultTimer = null;
function updateGuideDefault(){
  const gc = document.getElementById("guideCard");
  if(gc && !gc.dataset.locked) gc.innerHTML = guideDefaultHTML();
}
function showProductInGuide(st, item, key){
  if(!isDesktop()) return;
  clearTimeout(guideDefaultTimer);
  const gc = document.getElementById("guideCard");
  gc.dataset.locked = "1";
  renderCard(gc, st, item, key);
}
function clearGuideSoon(){
  clearTimeout(guideDefaultTimer);
  guideDefaultTimer = setTimeout(()=>{
    const gc = document.getElementById("guideCard");
    delete gc.dataset.locked;
    gc.innerHTML = guideDefaultHTML();
  }, 400);
}

/* ---------- SHEET (mobile) ---------- */
function openSheet(st, item, key){
  renderCard(document.getElementById("sheetContent"), st, item, key);
  document.getElementById("sheet").classList.add("open");
  document.getElementById("sheetBackdrop").classList.add("open");
}
function closeSheet(){
  document.getElementById("sheet").classList.remove("open");
  document.getElementById("sheetBackdrop").classList.remove("open");
}

/* ---------- TOAST ---------- */
let toastTimer=null;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 1400);
}

/* ---------- EAT ANIMATION (food only, in the gap before the "i" button) ---------- */
function playEat(rowEl, item, st){
  if(reduceMotion){ return; }
  const layer = document.getElementById("fxLayer");
  const info = rowEl.querySelector(".info-btn");
  const ir = info.getBoundingClientRect();
  const cx = ir.left - 30;              // свободное место между текстом и кнопкой «i»
  const cy = ir.top + ir.height/2;

  const food = document.createElement("div");
  food.className = "fx-item";
  food.textContent = item.f;
  food.style.cssText = `left:${cx}px; top:${cy}px; font-size:26px; transform:translate(-50%,-50%) scale(0);`;
  layer.appendChild(food);

  const a = food.animate([
    {transform:"translate(-50%,-50%) scale(0) rotate(-20deg)", opacity:0, offset:0},
    {transform:"translate(-50%,-64%) scale(1.4) rotate(10deg)", opacity:1, offset:0.18},
    {transform:"translate(-50%,-60%) scale(1.08) rotate(-6deg)", opacity:1, offset:0.32},
    {transform:"translate(-50%,-62%) scale(1.12) rotate(4deg)", opacity:1, offset:0.72},
    {transform:"translate(-50%,-84%) scale(0) rotate(14deg)", opacity:0, offset:1}
  ], {duration:1500, easing:"cubic-bezier(.34,1.4,.6,1)", fill:"forwards"});
  a.onfinish = ()=> food.remove();

  // крошки-звёздочки вокруг продукта
  setTimeout(()=> spawnCrumbs(layer, cx, cy - 6), 260);
}
function spawnCrumbs(layer, x, y){
  const colors = ["#E2793D","#6FA25C","#E8AC2E","#E0708A","#3E8FC4"];
  for(let i=0;i<6;i++){
    const c = document.createElement("div");
    c.className = "fx-item";
    const size = 5 + Math.random()*4;
    c.style.cssText = `left:${x}px; top:${y}px; width:${size}px; height:${size}px; border-radius:50%; background:${colors[i%colors.length]};`;
    layer.appendChild(c);
    const ang = Math.random()*Math.PI*2;
    const dist = 22 + Math.random()*24;
    const dx = Math.cos(ang)*dist, dy = Math.sin(ang)*dist - 6;
    const a = c.animate([
      {transform:"translate(-50%,-50%) scale(1)", opacity:1},
      {transform:`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0)`, opacity:0}
    ], {duration:500+Math.random()*220, easing:"cubic-bezier(.2,.6,.4,1)", fill:"forwards"});
    a.onfinish = ()=> c.remove();
  }
}

/* ---------- CONFETTI ---------- */
function confetti(big){
  if(reduceMotion) return;
  const layer = document.getElementById("fxLayer");
  const colors = ["#E2793D","#6FA25C","#E8AC2E","#E0708A","#3E8FC4","#A6567A"];
  const n = big ? 46 : 22;
  for(let i=0;i<n;i++){
    const p = document.createElement("div");
    p.className = "fx-item";
    const size = 7 + Math.random()*7;
    const x = window.innerWidth*(0.2+Math.random()*0.6);
    p.style.cssText = `left:${x}px; top:-14px; width:${size}px; height:${size*0.6}px; background:${colors[i%colors.length]}; border-radius:2px;`;
    layer.appendChild(p);
    const dur = 1200 + Math.random()*1100;
    const dx = (Math.random()-0.5)*220;
    const rot = (Math.random()-0.5)*720;
    const a = p.animate([
      {transform:"translate(0,0) rotate(0deg)", opacity:1},
      {transform:`translate(${dx}px, ${window.innerHeight+40}px) rotate(${rot}deg)`, opacity:.9}
    ], {duration:dur, easing:"cubic-bezier(.3,.5,.5,1)", fill:"forwards"});
    a.onfinish = ()=> p.remove();
  }
}

/* ---------- RENDER ---------- */
function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";

  STAGES.forEach(st=>{
    const stEl = document.createElement("div");
    stEl.className = `stage theme-${st.theme}`;
    stEl.dataset.stage = st.id;

    const head = document.createElement("div");
    head.className = "stage-head";
    head.setAttribute("role","button");
    head.setAttribute("tabindex","0");
    head.setAttribute("aria-expanded","true");
    head.innerHTML = `
      <div class="stage-emoji">${st.emoji}</div>
      <div class="stage-title-wrap">
        <p class="stage-title">${st.age}</p>
        <div class="stage-progress-text">0 из ${st.items.length}</div>
      </div>
      <span class="stage-medal" title="Этап пройден">🏅</span>
      <div class="stage-chevron">▾</div>`;
    const toggle = ()=>{
      const c = stEl.classList.toggle("collapsed");
      head.setAttribute("aria-expanded", String(!c));
    };
    head.addEventListener("click", toggle);
    head.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }});
    stEl.appendChild(head);

    const barTrack = document.createElement("div");
    barTrack.className = "stage-bar-track";
    barTrack.innerHTML = `<div class="stage-bar-fill"></div>`;
    stEl.appendChild(barTrack);

    const body = document.createElement("div");
    body.className = "stage-body";

    if(st.subtitle){
      const sub = document.createElement("div");
      sub.className = "subtitle-note";
      sub.textContent = st.subtitle;
      body.appendChild(sub);
    }

    st.items.forEach((item,i)=>{
      const key = st.id+"-"+i;
      const row = document.createElement("div");
      row.className = "item";
      row.dataset.name = item.n.toLowerCase();
      row.setAttribute("role","checkbox");
      row.setAttribute("tabindex","0");
      row.setAttribute("aria-label", item.n);
      row.dataset.key = key;
      row.innerHTML = `
        <div class="checkbox">✓</div>
        <div class="item-label">${item.n}</div>
        <span class="row-react"></span>
        <button class="info-btn" aria-label="Совет: ${item.n}" tabindex="-1">i</button>`;
      const box = row.querySelector(".checkbox");
      const label = row.querySelector(".item-label");
      const info = row.querySelector(".info-btn");

      const applyState = ()=>{
        const on = !!state[key];
        box.classList.toggle("checked", on);
        label.classList.toggle("checked", on);
        row.setAttribute("aria-checked", String(on));
      };
      applyState();
      updateRowReact(key);

      const wasStageDone = ()=> st.items.every((_,j)=> state[st.id+"-"+j]);

      const toggleItem = ()=>{
        const turningOn = !state[key];
        state[key] = turningOn;
        applyState();
        updateStageProgress(stEl, st);
        updateHero();
        saveState();
        if(turningOn){
          if(!dates[key]){ dates[key] = new Date().toISOString(); saveDates(); }
          playEat(row, item, st);
          toast(PRAISES[Math.floor(Math.random()*PRAISES.length)]);
          if(navigator.vibrate) navigator.vibrate(18);
          if(wasStageDone()){
            confetti(false);
            const {total,checked}=totalCounts();
            if(total===checked){ setTimeout(()=>confetti(true),150); toast("Все продукты введены! 🎉🏆"); }
          }
        } else {
          delete dates[key]; saveDates();
        }
      };

      row.addEventListener("click", e=>{
        if(e.target.closest(".info-btn")) return;
        toggleItem();
      });
      row.addEventListener("keydown", e=>{
        if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggleItem(); }
        if(e.key==="i"){ isDesktop()? showProductInGuide(st,item,key) : openSheet(st,item,key); }
      });
      // desktop hover → guide panel
      row.addEventListener("mouseenter", ()=> showProductInGuide(st, item, key));
      row.addEventListener("mouseleave", clearGuideSoon);
      // info button → mobile sheet (and desktop pin)
      info.addEventListener("click", e=>{
        e.stopPropagation();
        if(isDesktop()) showProductInGuide(st, item, key);
        else openSheet(st, item, key);
      });

      body.appendChild(row);
    });

    if(st.goal){
      const note = document.createElement("div");
      note.className = "goal-note";
      note.innerHTML = `<span class="ic">🎯</span><span>${st.goal}</span>`;
      body.appendChild(note);
    }

    stEl.appendChild(body);
    main.appendChild(stEl);
    updateStageProgress(stEl, st);
  });

  // warning section
  const warnEl = document.createElement("div");
  warnEl.className = `stage theme-${WARN_SECTION.theme}`;
  warnEl.dataset.stage = "w1";
  warnEl.innerHTML = `
    <div class="stage-head" role="button" tabindex="0" aria-expanded="true">
      <div class="stage-emoji">${WARN_SECTION.emoji}</div>
      <div class="stage-title-wrap">
        <p class="stage-title">${WARN_SECTION.age}</p>
        <div class="stage-progress-text">Важно помнить</div>
      </div>
      <div class="stage-chevron">▾</div>
    </div>
    <div class="stage-body">
      <ul class="plain-list warn-list">
        ${WARN_SECTION.list.map(t=>`<li data-name="${t.toLowerCase()}">${t}</li>`).join("")}
      </ul>
    </div>`;
  const wHead = warnEl.querySelector(".stage-head");
  const wToggle = ()=>{ const c=warnEl.classList.toggle("collapsed"); wHead.setAttribute("aria-expanded",String(!c)); };
  wHead.addEventListener("click", wToggle);
  wHead.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); wToggle(); }});
  main.appendChild(warnEl);

  const resetBtn = document.createElement("button");
  resetBtn.className = "reset-btn";
  resetBtn.textContent = "Сбросить отметки";
  resetBtn.addEventListener("click", ()=>{
    if(confirm("Сбросить все отметки?")){
      state = {}; saveState(); render(); updateHero();
    }
  });
  main.appendChild(resetBtn);

  // свернуть все категории по умолчанию, раскрыть первую незавершённую (текущую)
  const stageEls = [...document.querySelectorAll("#main .stage")];
  stageEls.forEach(el=>{
    el.classList.add("collapsed");
    const h = el.querySelector(".stage-head");
    if(h) h.setAttribute("aria-expanded","false");
  });
  const firstOpen = STAGES.find(st=> !st.items.every((_,j)=> state[st.id+"-"+j]));
  const openEl = firstOpen ? document.querySelector(`#main .stage[data-stage="${firstOpen.id}"]`) : stageEls[0];
  if(openEl){
    openEl.classList.remove("collapsed");
    const h = openEl.querySelector(".stage-head");
    if(h) h.setAttribute("aria-expanded","true");
  }

  updateHero();
  document.getElementById("guideCard").innerHTML = guideDefaultHTML();
}

/* ---------- SEARCH + FILTERS ---------- */
function applyFilters(){
  const q = (document.getElementById("search").value||"").trim().toLowerCase();
  document.getElementById("searchClear").classList.toggle("show", q.length>0);
  const active = q.length>0 || filterMode!=="all";
  let anyVisible = false;

  document.querySelectorAll("#main .stage").forEach(stEl=>{
    const sid = stEl.dataset.stage;
    const isWarn = sid==="w1";
    const isAllergen = sid==="s8";

    if(filterMode==="allergens" && !isAllergen){ stEl.classList.add("hide"); return; }

    if(isWarn){
      if(filterMode!=="all"){ stEl.classList.add("hide"); return; }
      let vis=0;
      stEl.querySelectorAll(".warn-list li").forEach(li=>{
        const m = !q || li.dataset.name.includes(q);
        li.style.display = m? "flex":"none"; if(m) vis++;
      });
      const show = vis>0;
      stEl.classList.toggle("hide", !show);
      if(show){ anyVisible=true; if(active) stEl.classList.remove("collapsed"); }
      return;
    }

    let vis=0;
    stEl.querySelectorAll(".item").forEach(row=>{
      const key = row.dataset.key;
      let m = (!q || row.dataset.name.includes(q));
      if(filterMode==="todo" && state[key]) m=false;
      row.classList.toggle("hidden", !m); if(m) vis++;
    });
    const show = vis>0;
    stEl.classList.toggle("hide", !show);
    if(show){ anyVisible=true; if(active) stEl.classList.remove("collapsed"); }
  });

  document.getElementById("noResults").classList.toggle("show", active && !anyVisible);
}

/* ---------- INIT ---------- */
loadState();
render();

document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("searchClear").addEventListener("click", ()=>{
  const s=document.getElementById("search"); s.value=""; applyFilters(); s.focus();
});
document.querySelectorAll("#chips .chip").forEach(c=>{
  c.addEventListener("click", ()=>{
    document.querySelectorAll("#chips .chip").forEach(x=> x.classList.remove("active"));
    c.classList.add("active");
    filterMode = c.dataset.f;
    applyFilters();
  });
});
// держим панель-подсказку, пока курсор на ней (десктоп)
const gc = document.getElementById("guideCard");
gc.addEventListener("mouseenter", ()=> clearTimeout(guideDefaultTimer));
gc.addEventListener("mouseleave", clearGuideSoon);
document.getElementById("sheetBackdrop").addEventListener("click", closeSheet);
document.getElementById("sheetClose").addEventListener("click", closeSheet);
document.getElementById("sheetGrip").addEventListener("click", closeSheet);
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeSheet(); });

// свайп вниз, чтобы закрыть шторку
(function(){
  const sheet = document.getElementById("sheet");
  const inner = document.getElementById("sheetInner");
  let startY = 0, delta = 0, dragging = false;
  sheet.addEventListener("touchstart", e=>{
    if(inner && inner.scrollTop > 0) return;     // если контент прокручен — обычный скролл
    if(e.target.closest(".react-btn")) return;   // не мешаем нажатию на реакции
    startY = e.touches[0].clientY; delta = 0; dragging = true;
    sheet.style.transition = "none";
  }, {passive:true});
  sheet.addEventListener("touchmove", e=>{
    if(!dragging) return;
    delta = e.touches[0].clientY - startY;
    if(delta > 0) sheet.style.transform = `translateY(${delta}px)`;
  }, {passive:true});
  sheet.addEventListener("touchend", ()=>{
    if(!dragging) return;
    dragging = false;
    sheet.style.transition = "";
    sheet.style.transform = "";
    if(delta > 80) closeSheet();
  });
})();
</script>
